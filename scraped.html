<script id="coalias_meta">
  sendMetaData();

  function sendMetaData() {
      if(window.coalias_preserve_meta) return

      var metaData = {};

      metaData['documentTitle'] = document.title;

      var metaElements = document.getElementsByTagName("meta");
      for (var i = 0; i < metaElements.length; i++) {
      var metaElement = metaElements[i];
      var name = metaElement.getAttribute("name");
      var content = metaElement.getAttribute("content");
          if (name && content) {
              if (name === "description") {
                  metaData["description"] = content;
              }
          }
      }

      var faviconElement = document.querySelector("link[rel*='icon']");
      if (faviconElement) {
          metaData["favicon"] = faviconElement.getAttribute("href");
      }

      var openGraphMetaTags = {};
      var openGraphElements = document.querySelectorAll("meta[property^='og:']");
      for (var i = 0; i < openGraphElements.length; i++) {
          var openGraphElement = openGraphElements[i];
          var property = openGraphElement.getAttribute("property");
          var content = openGraphElement.getAttribute("content");
          openGraphMetaTags[property] = content;
      }
      metaData["openGraphMetaTags"] = openGraphMetaTags;

      var linkTypes = {};
      var linkElements = document.querySelectorAll("link[rel]");
      for (var i = 0; i < linkElements.length; i++) {
      var linkElement = linkElements[i];
      var rel = linkElement.getAttribute("rel");
      if (rel === "icon" || rel === "shortcut icon" || rel === "author" || rel === "apple-touch-icon" || rel === "apple-touch-icon-precomposed" || rel === "manifest") {
          var href = linkElement.getAttribute("href");
          linkTypes[rel] = href;
      }
      }
      metaData["linkTypes"] = linkTypes;

      window.top.postMessage({"coalias": {"meta": metaData}}, "*");
  }

  const observer = new MutationObserver(mutations => {
      mutations.forEach(mutation => {
          if (
              (mutation.target.nodeName === 'TITLE' && mutation.target.nodeType === Node.ELEMENT_NODE) ||
              (mutation.target.nodeName === 'META' && mutation.target.nodeType === Node.ELEMENT_NODE) ||
              (mutation.target.nodeName === 'LINK' && mutation.target.nodeType === Node.ELEMENT_NODE) ||
              (mutation.target.nodeName === 'OG:TITLE' && mutation.target.nodeType === Node.ELEMENT_NODE)
          ) {
              // If any changes are detected, send a post message to window.top
              sendMetaData();
          }
      });
  });

  const head = document.querySelector('head');
  observer.observe(head, {
      childList: true,
      subtree: true,
  });
</script>

  XMLHttpRequest.prototype.open = function() {

      arguments[1] = arguments[1].toString()
    }

    if (arguments[1] !== undefined && typeof arguments[1] == 'string' && arguments[1].includes("https://" + target_url_hostname) && !arguments[1].includes("https://" + REQUEST_HOSTNAME_ORIGINAL)) {

      if(window.coalias_debug) console.log('add routes to ' + arguments[1])
      this.setRequestHeader('x-coalias-route', route_jwt);

  }

  const fetch_coalias = fetch;
  fetch = function(url, options) {
    try{
      url = url.replace('https://' + target_url_hostname, 'https://' + REQUEST_HOSTNAME_ORIGINAL);
      
      if(url !== undefined && url.includes("https://" + REQUEST_HOSTNAME_ORIGINAL)) {
        // set header for request

        }
        options.headers = { ...options.headers, 'x-coalias-route': route_jwt };

    }

    return fetch_coalias.call(this, url, options).then(response => {
      try {

        if(typeof url !== 'string') return response
        if(!url.startsWith('http://') && !url.startsWith('https://')) return response

        // Only replace REQUEST_HOSTNAME with TARGET_HOSTNAME in the response if URL includes REQUEST_HOSTNAME_ORIGINAL

<script id="coalias_static_rewrite" 
  data-base_path="https://fathership.statstak.io" data-technology="bubble">
  var script = document.querySelector('#coalias_static_rewrite');
  var technology = script.dataset.technology;
  var basePath = script.dataset.base_path;

  // observe new elements added
  addBasePathToRelativeUrls(basePath);

  function addBasePathToRelativeUrls(basePath) {
    var observer = new MutationObserver(function (mutations) {
      mutations.forEach(function (mutation) {
        var addedNodes = mutation.addedNodes;
        for (var i = 0; i < addedNodes.length; i++) {
          var node = addedNodes[i];
          if (node.nodeName === 'SCRIPT' || node.nodeName === 'STYLE' || node.nodeName === 'IMG') {
            // if technolgy is bubble and src starts with /package, don't change anything. This break module functionality.
            if(technology == 'bubble' && node.getAttribute('src') && node.getAttribute('src').startsWith('/package') && node.getAttribute('type') !== 'modulepreload') return;

            var src = node.getAttribute('src') || node.getAttribute('href');
            if (src && !src.startsWith('/coalias') && !src.startsWith('//') && !src.startsWith('http') && !src.startsWith('data:') && !src.startsWith('blob:')) {
              if(src.startsWith('/')) node.setAttribute('src', basePath + src);
              else node.setAttribute('src', basePath + "/" + src);
            }
          }
        }
      });
    });
    observer.observe(document, { childList: true, subtree: true });
  }
</script>

<style>
    /* === BASE EVENT SHAPE === */
    .b-sch-event {
        border-radius: 4px !important;
        box-shadow: none !important;
        border: none !important;
    }
    
    /* Default background for events without inline color */
    .b-sch-event:not([style*="background"]) {
        background-color: #5f6368 !important;
    }
    
    .b-sch-event:hover {
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2) !important;
    }

    .b-verticaltimeaxiscolumn .b-sch-event-wrap {
        overflow: visible !important;
    }
    
    .b-grid-splitter-buttons {
        visibility: hidden !important;
    }
    
    .b-sch-header-timeaxis-cell {
        font-size: var(--customized-font-size, 12px) !important;
        font-weight: var(--customized-font-weight, 410) !important;
    }

    /* === EVENT STYLING === */
    .customized-event {
        border: none !important;
        border-radius: 4px !important;
    }
    
    .b-sch-event.customized-event {
        --b-sch-event-selected-brightness: 1;
        --b-sch-event-hover-brightness: 1;
    }
    
    /* === EVENT CONTENT CONTAINER === */
    .customized-event .b-sch-event-content {
        display: flex !important;
        flex-direction: column !important;
        align-items: flex-start !important;
        height: 100% !important;
        width: 100% !important;
        box-sizing: border-box !important;
        overflow: hidden !important;
        gap: 0 !important;
    }
    
    /* Event content wrapper for centering control */
    .event-content-wrapper {
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        width: 100%;
        height: 100%;
        overflow: hidden;
    }
    
    /* Horizontal mode: always center content vertically */
    .b-sch-horizontal .event-content-wrapper {
        justify-content: center;
    }
    
    /* === LOCKED EVENTS (privacy mode) === */
    .locked-event {
        cursor: default !important;
        opacity: 0.85;
    }
    
    .locked-event:hover {
        filter: none !important;
        transform: none !important;
    }
    
    /* Horizontal mode: centered vertically */
    .b-sch-horizontal .customized-event .b-sch-event-content {
        padding: 2px 0 2px 4px !important;
        justify-content: center !important;
    }
    
    /* === EVENT TEXT LINES === */
    .customized-event .event-line {
        width: 100%;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.3;
        flex-shrink: 0;
    }
    
    .customized-event .event-name {
        font-size: 12px;
        font-weight: 500;
    }
    
    .customized-event .event-time {
        font-size: 11px;
        font-weight: 400;
        opacity: 0.85;
    }
    
    /* === VERTICAL MODE EVENT TEXT FIX === */
    
    /* Always top-align content in vertical mode */
    .b-sch-vertical .event-content-wrapper {
        justify-content: flex-start !important;
    }
    
    /* Vertical mode: tighter padding, always top-aligned */
    .b-sch-vertical .customized-event .b-sch-event-content {
        padding: 4px 4px 2px 5px !important;
        justify-content: flex-start !important;
        gap: 1px !important;
    }
    
    /* Slightly smaller text for vertical mode to fit narrow columns */
    .b-sch-vertical .customized-event .event-name {
        font-size: 11px;
        font-weight: 500;
        line-height: 1.25;
    }
    
    .b-sch-vertical .customized-event .event-time {
        font-size: 10px;
        font-weight: 400;
        line-height: 1.25;
        opacity: 0.85;
    }
    
    /* Ensure text truncates properly in vertical mode */
    .b-sch-vertical .customized-event .event-line {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
    }
    
    /* === DYNAMIC TEXT COLORS === */
    .customized-event.light-bg .event-name,
    .customized-event.light-bg .event-time {
        color: #1a1a1a !important;
    }
    
    .customized-event.dark-bg .event-name,
    .customized-event.dark-bg .event-time {
        color: #ffffff !important;
    }

    /* === COMPACT MODE TEXT COLORS === */
    .compact-event.light-bg,
    .compact-event.light-bg .event-name-compact {
        color: #1a1a1a !important;
    }
    
    .compact-event.dark-bg,
    .compact-event.dark-bg .event-name-compact {
        color: #ffffff !important;
    }

    /* === RESOURCE HEADERS === */
    .b-resourceheader-cell {
        font-size: var(--customized-font-size, 12px) !important;
        font-weight: var(--customized-font-weight, 410) !important;
        overflow: hidden !important;
        cursor: pointer !important;
        transition: background-color 0.15s ease !important;
    }
    
    .b-resourceheader-cell:hover {
        background-color: rgba(255, 255, 255, 0.08) !important;
    }
    
    .b-resourceheader .resource-header-text {
        display: block;
        width: 100%;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        text-align: center;
    }

    /* === RESOURCE SELECTION HIGHLIGHT === */
    
    /* Vertical mode: column header highlight - blue accent */
    .b-sch-vertical .b-resourceheader-cell.resource-selected {
        background-color: rgba(66, 133, 244, 0.3) !important;
        box-shadow: inset 0 -3px 0 0 #4285f4 !important;
    }
    
    /* Vertical mode: resource column background - light grey */
    .b-sch-vertical .b-sch-resourcecolumn.resource-selected,
    .b-sch-vertical .resource-selected .b-sch-resourcecolumn,
    .b-sch-vertical [class*="resource-selected"] {
        background-color: rgba(255, 255, 255, 0.06) !important;
    }
    
    /* Horizontal mode: row highlight via Bryntum's resource cls - light grey */
    .b-sch-horizontal .b-grid-row.resource-selected,
    .b-sch-horizontal .resource-selected.b-grid-row {
        background-color: rgba(255, 255, 255, 0.04) !important;
    }
    
    .b-sch-horizontal .b-grid-row.resource-selected .b-grid-cell,
    .b-sch-horizontal .resource-selected.b-grid-row .b-grid-cell {
        background-color: transparent !important;
    }
    
    /* Horizontal mode: name cell gets the blue accent */
    .b-sch-horizontal .b-grid-row.resource-selected .b-grid-cell:first-child,
    .b-sch-horizontal .resource-selected.b-grid-row .b-grid-cell:first-child {
        background-color: rgba(66, 133, 244, 0.25) !important;
        box-shadow: inset 3px 0 0 0 #4285f4 !important;
    }
    
    .b-sch-horizontal .b-grid-row.resource-selected .b-sch-timeaxis-cell,
    .b-sch-horizontal .resource-selected.b-grid-row .b-sch-timeaxis-cell {
        background-color: rgba(255, 255, 255, 0.03) !important;
    }
    
    /* Make resource name cells clickable in horizontal mode */
    .b-sch-horizontal .b-grid-cell[data-column="name"] {
        cursor: pointer !important;
    }
    
    .b-sch-horizontal .b-grid-cell[data-column="name"]:hover {
        background-color: rgba(255, 255, 255, 0.08) !important;
    }

    /* ============================================
       CLEAN LOADING OVERLAY - Google Calendar Style
       ============================================ */
    
    /* Override Bryntum's default mask styling */
    .b-mask {
        background: var(--b-custom-dark, rgb(35, 38, 48)) !important;
        opacity: 0.7 !important;
        backdrop-filter: none !important;
    }
    
    /* Hide the default mask content (text, progress bar) */
    .b-mask .b-mask-content {
        background: transparent !important;
        box-shadow: none !important;
        border: none !important;
    }
    
    .b-mask .b-mask-text,
    .b-mask .b-mask-progress {
        display: none !important;

    /* Custom clean Google-style spinner */
    .b-mask .b-mask-content::before {
        content: '';

        width: 32px;
        height: 32px;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: #8ab4f8;
        border-radius: 50%;
        animation: gcalSpin 0.8s linear infinite;
        margin: 0 auto;
    }
    
    @keyframes gcalSpin {
        to { transform: rotate(360deg); }
    }

    /* ============================================
       GOOGLE CALENDAR STYLE TOOLTIP
       ============================================ */
    
    /* Tooltip container override */
    .gcal-tooltip-container.b-tooltip {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
    }
    
    .gcal-tooltip-container .b-tooltip-content {
        padding: 0 !important;
        background: transparent !important;
    }
    
    .gcal-tooltip-container,
    .gcal-tooltip-container *:not(.gcal-tooltip):not(.gcal-tooltip *) {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
    }

    /* Main tooltip wrapper */
    .gcal-tooltip {
        background: #2d2e30;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 
                    0 2px 8px rgba(0, 0, 0, 0.3);
        min-width: 300px;
        max-width: 380px;
        max-height: 80vh;
        overflow: hidden;
        font-family: 'Google Sans', 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
        color: #e8eaed;
        animation: tooltipFadeIn 0.15s ease-out;
    }
    
    .gcal-tooltip .tooltip-body {
        max-height: calc(80vh - 200px);
        overflow-y: auto;
    }

    @keyframes tooltipFadeIn {
        from {
            opacity: 0;
            transform: translateY(-4px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Optional header image */
    .tooltip-image {
        width: 100%;
        height: 120px;
        overflow: hidden;
        border-radius: 12px 12px 0 0;
    }

    .tooltip-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* Header section with color indicator */
    .tooltip-header {
        display: flex;
        align-items: flex-start;
        padding: 16px 16px 12px 16px;
        gap: 12px;
    }

    .tooltip-color-indicator {
        width: 16px;
        height: 16px;
        border-radius: 4px;
        flex-shrink: 0;
        margin-top: 3px;
    }

    .tooltip-header-content {
        flex: 1;
        min-width: 0;
    }

    .tooltip-event-name {
        font-size: 18px;
        font-weight: 500;
        color: #e8eaed;
        line-height: 1.3;
        margin-bottom: 4px;
        word-wrap: break-word;
    }

    .tooltip-datetime {
        font-size: 13px;
        color: #9aa0a6;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 4px;
    }

    .tooltip-date {
        color: #9aa0a6;
    }

    .tooltip-time-separator {
        color: #9aa0a6;
        font-weight: 400;
    }

    .tooltip-time {
        color: #9aa0a6;
    }

    /* Resource/Facility section */
    .tooltip-resource {
        display: flex;
        align-items: center;
        padding: 8px 16px;
        gap: 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .tooltip-resource-name {
        font-size: 13px;
        color: #e8eaed;
    }

    /* Section styling */
    .tooltip-section {
        padding: 12px 16px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .tooltip-section-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
    }

    .tooltip-section-icon {
        width: 20px;
        height: 20px;
        color: #9aa0a6;
        flex-shrink: 0;
    }

    .tooltip-section-title {
        font-size: 13px;
        font-weight: 500;
        color: #e8eaed;
    }

    .tooltip-section-subtitle {
        font-size: 12px;
        color: #9aa0a6;
        margin-left: auto;
    }

    /* Person list */
    .tooltip-person-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding-left: 32px;
    }

    .tooltip-person {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .tooltip-avatar-wrapper {
        position: relative;
        width: 32px;
        height: 32px;
        flex-shrink: 0;
    }

    .tooltip-avatar-img {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        object-fit: cover;
    }

    .tooltip-avatar-initials {
        width: 32px;
        height: 32px;
        border-radius: 50%;

        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 500;
        color: white;
        text-transform: uppercase;
    }

    .tooltip-confirmed-icon {
        position: absolute;
        bottom: -2px;
        right: -2px;
        width: 14px;
        height: 14px;
        color: #34a853;
        background: #2d2e30;
        border-radius: 50%;

    .tooltip-person-info {
        display: flex;
        flex-direction: column;
        min-width: 0;
        flex: 1;
    }

    .tooltip-person-name {
        font-size: 13px;
        font-weight: 400;
        color: #e8eaed;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;

    .tooltip-person-role {
        font-size: 11px;
        color: #9aa0a6;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;

        cursor: pointer;
        padding: 4px 0;
    }

    .tooltip-more:hover {

    /* Loading spinner for tooltip */
    .tooltip-loading {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
